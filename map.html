<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>深夜図書館 — 書庫探索</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root {
    --bg-night: #090710;
    --bg-panel: #161226;
    --gold: #d9b25e;
    --gold-soft: #f0d99a;
    --line: rgba(217,178,94,0.28);
  }

  /* 画面全体のスクロールを防ぐ */
  html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }

  body {
    background: var(--bg-night);
    color: #ece6d8;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: 
      radial-gradient(circle at 50% 50%, rgba(28,24,48,0.4) 0%, var(--bg-night) 80%);
  }

  .game-container {
    width: 360px;
    background: var(--bg-panel);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 20px 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 20px rgba(217,178,94,0.05);
    text-align: center;
  }

  h3 {
    font-family: 'Shippori Mincho', serif;
    color: var(--gold-soft);
    margin: 0 0 6px;
    font-size: 18px;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(217,178,94,0.3);
  }

  p {
    font-size: 11px;
    color: #a89e8a;
    margin: 0 0 16px;
    line-height: 1.5;
    letter-spacing: 0.5px;
  }

  /* ★10x10のグリッド設定（1コマ32px） */
  .map {
    display: grid;
    grid-template-columns: repeat(10, 32px);
    grid-template-rows: repeat(10, 32px);
    width: 320px;
    height: 320px;
    background: #0d150d;
    border: 3px solid #281a30;
    position: relative;
    margin: 0 auto;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.9), 0 10px 25px rgba(0,0,0,0.5);
  }

  .tile {
    width: 32px;
    height: 32px;
    box-sizing: border-box;
    image-rendering: pixelated; /* ドット絵感を出す */
  }

  /* 🌿【草地タイル (0)】ドット絵風の芝生のテクスチャ */
  .tile-grass {
    background: #1b381b;
    background-image: 
      radial-gradient(#152e15 15%, transparent 16%),
      radial-gradient(#122612 15%, transparent 16%);
    background-size: 8px 8px;
    background-position: 0 0, 4px 4px;
    border: 1px solid rgba(0, 0, 0, 0.05);
  }

  /* 🏜️【土の道タイル (1)】プレイヤーがメインで歩く砂利道 */
  .tile-dirt {
    background: #4a3c2c;
    background-image: 
      linear-gradient(rgba(0,0,0,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.15) 1px, transparent 1px);
    background-size: 16px 16px;
    position: relative;
  }
  .tile-dirt::before {
    content: "";
    position: absolute;
    inset: 2px;
    background: rgba(255, 255, 255, 0.02);
  }

  /* 🧱【レンガの壁 (2)】障害物。重厚な石づくりの洋館の壁 */
  .tile-brick-wall {
    background: #3e2723;
    background-image: 
      linear-gradient(90deg, #1d0f0d 2px, transparent 2px),
      linear-gradient(#1d0f0d 2px, transparent 2px);
    background-size: 16px 10px; /* レンガ調のパターン */
    border: 1px solid #1d0f0d;
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.15), inset 0 -3px 0 rgba(0,0,0,0.4);
  }

  /* 🌲【植え込み・生垣 (3)】障害物。画像のような丸い生垣 */
  .tile-hedge {
    background: #0f3d0f;
    background-image: radial-gradient(#165a16 40%, transparent 45%);
    background-size: 16px 16px;
    border-radius: 4px;
    border: 2px solid #082408;
    box-shadow: inset 0 4px 0 rgba(255,255,255,0.1), 0 2px 4px rgba(0,0,0,0.4);
  }

  /* 🗿【水色の女神像 (4)】障害物。画像中央下部にある美しい彫刻をイメージ */
  .tile-statue {
    background: #4a3c2c; /* 土台は土の道と同じ */
    position: relative;
  }
  .tile-statue::before {
    content: "⛲";
    font-size: 16px;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 4px #4fc3f7) hue-rotate(180deg);
    animation: statueGlow 2s infinite alternate;
  }
  @keyframes statueGlow {
    0% { transform: scale(0.95); opacity: 0.8; }
    100% { transform: scale(1.05); opacity: 1; }
  }

  /* 🏮【街灯 (5)】障害物。暖かな光を放つアンティークな鉄製の街灯 */
  .tile-lamp {
    background: #4a3c2c;
    position: relative;
  }
  .tile-lamp::before {
    content: "🏮";
    font-size: 16px;
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    filter: drop-shadow(0 0 6px var(--gold));
  }

  /* ✨【光る禁書 (9)】イベントポイント。目標地点 */
  .tile-event {
    background: #4a3c2c;
    position: relative;
  }
  .tile-event-star {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: floatBook 1.2s infinite alternate ease-in-out;
    z-index: 2;
  }
  .tile-event-star::before {
    content: "📖";
    font-size: 14px;
    filter: drop-shadow(0 0 5px var(--gold));
  }
  .tile-event::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    border: 1px dashed rgba(217,178,94,0.4);
    animation: rotateMagic 6s linear infinite;
  }
  @keyframes floatBook {
    0% { transform: translateY(-1px); }
    100% { transform: translateY(-5px); }
  }
  @keyframes rotateMagic {
    100% { transform: rotate(360deg); }
  }

  /* 🚶【ちびキャラ】向きが変わるドット風プレイヤー */
  .player {
    width: 32px;
    height: 32px;
    position: absolute;
    transition: left 0.15s ease, top 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  
  .sprite {
    width: 24px;
    height: 28px;
    background: #d9b25e; /* フード */
    border-radius: 12px 12px 4px 4px;
    position: relative;
    box-shadow: 0 4px 6px rgba(0,0,0,0.6);
    transition: transform 0.1s ease;
  }
  .sprite::before {
    content: "";
    position: absolute;
    top: 6px;
    left: 4px;
    width: 16px;
    height: 10px;
    background: #fcd5b5; /* 顔 */
    border-radius: 3px;
  }
  .sprite::after {
    content: "";
    position: absolute;
    top: 9px;
    left: 7px;
    width: 2px;
    height: 3px;
    background: #1c1326;
    box-shadow: 6px 0 0 #1c1326; /* 目 */
  }

  /* 左を向いたとき反転 */
  .player.face-left .sprite {
    transform: scaleX(-1);
  }

  /* ポップアップ「調べる」 */
  .action-bubble {
    position: absolute;
    top: -24px;
    background: #ece6d8;
    color: #12101c;
    font-size: 9px;
    font-weight: bold;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid var(--gold);
    box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    animation: bounceBubble 0.6s infinite alternate;
    pointer-events: none;
    display: none;
    z-index: 15;
  }
  .action-bubble::after {
    content: "";
    position: absolute;
    bottom: -4px; left: 50%;
    transform: translateX(-50%);
    border-width: 4px 4px 0;
    border-style: solid;
    border-color: #ece6d8 transparent;
  }
  @keyframes bounceBubble {
    0% { transform: translateY(0); }
    100% { transform: translateY(-3px); }
  }

  /* コントローラー */
  .controls-wrapper {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 320px;
    margin: 18px auto 0;
    padding: 0 4px;
  }

  .controls-cross {
    display: grid;
    grid-template-columns: repeat(3, 38px);
    grid-template-rows: repeat(3, 38px);
    gap: 4px;
  }
  .btn-dir {
    background: #281e3a;
    border: 2px solid #3c2f54;
    color: var(--gold-soft);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-dir:active {
    background: #463466;
    border-color: var(--gold);
  }
  .btn-empty { visibility: hidden; }

  .btn-action-round {
    width: 62px;
    height: 62px;
    background: radial-gradient(circle, #e8734a 0%, #b84a25 100%);
    border: 3px solid var(--gold-soft);
    border-radius: 50%;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 6px 0 #782910, 0 8px 15px rgba(0,0,0,0.4);
    transition: transform 0.05s ease;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .btn-action-round span {
    font-size: 16px;
    margin-top: -2px;
  }
  .btn-action-round:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #782910, 0 4px 8px rgba(0,0,0,0.4);
  }
</style>
</head>
<body>

  <div class="game-container">
    <h3>深夜の書庫 探索</h3>
    <p>【十字キー】で道を歩き、女神像の奥にある【光る本📖】まで進んで【決定】を押してください。</p>
    
    <div class="map" id="gameMap">
      <div class="player" id="player">
        <div class="action-bubble" id="actionBubble">調べる (Z)</div>
        <div class="sprite"></div>
      </div>
    </div>

    <div class="controls-wrapper">
      <div class="controls-cross">
        <button class="btn-empty"></button>
        <button class="btn-dir" onclick="movePlayer(0, -1)">▲</button>
        <button class="btn-empty"></button>
        <button class="btn-dir" onclick="movePlayer(-1, 0)">◀</button>
        <button class="btn-empty"></button>
        <button class="btn-dir" onclick="movePlayer(1, 0)">▶</button>
        <button class="btn-empty"></button>
        <button class="btn-dir" onclick="movePlayer(0, 1)">▼</button>
        <button class="btn-empty"></button>
      </div>

      <button class="btn-action-round" onclick="tryInteract()">
        <span>決定</span>
        <span style="font-size:10px; opacity:0.8;">A (Z)</span>
      </button>
    </div>
  </div>

<script>
  const MAP_SIZE = 10;
  const TILE_SIZE = 32;

  // 0:草地(通行不可) 1:土の道(通行可) 2:レンガ壁(不可) 3:生垣(不可) 4:石像(不可) 5:街灯(不可) 9:光る本(イベント)
  const mapData = [
    [2, 2, 2, 2, 2, 2, 2, 2, 2, 2],
    [2, 1, 1, 1, 3, 3, 3, 0, 0, 2],
    [2, 1, 3, 1, 1, 1, 1, 3, 0, 2],
    [2, 1, 3, 3, 3, 3, 1, 3, 0, 2],
    [2, 1, 1, 1, 1, 3, 1, 3, 3, 2],
    [2, 3, 3, 3, 1, 3, 1, 1, 1, 2],
    [2, 0, 0, 3, 1, 3, 3, 4, 1, 2], // [7,6]に水色の女神像
    [2, 0, 5, 3, 1, 1, 1, 1, 1, 2], // [2,7]にアンティーク街灯
    [2, 0, 0, 3, 3, 3, 3, 3, 9, 2], // [8,8]が目的地の光る本
    [2, 2, 2, 2, 2, 2, 2, 2, 2, 2]
  ];

  // イベント本の座標
  const EVENT_X = 8;
  const EVENT_Y = 8;

  let playerX = 1;
  let playerY = 1;

  const playerEl = document.getElementById('player');
  const gameMap = document.getElementById('gameMap');
  const actionBubble = document.getElementById('actionBubble');

  // マップを描画する
  function createMap() {
    gameMap.innerHTML = ''; 
    gameMap.appendChild(playerEl);

    for (let y = 0; y < MAP_SIZE; y++) {
      for (let x = 0; x < MAP_SIZE; x++) {
        const tileType = mapData[y][x];
        const tile = document.createElement('div');
        tile.className = 'tile';
        
        if (tileType === 0) tile.classList.add('tile-grass');
        else if (tileType === 1) tile.classList.add('tile-dirt');
        else if (tileType === 2) tile.classList.add('tile-brick-wall');
        else if (tileType === 3) tile.classList.add('tile-hedge');
        else if (tileType === 4) tile.classList.add('tile-statue');
        else if (tileType === 5) tile.classList.add('tile-lamp');
        else if (tileType === 9) {
          tile.classList.add('tile-event');
          const book = document.createElement('div');
          book.className = 'tile-event-star';
          tile.appendChild(book);
        }
        
        gameMap.appendChild(tile);
      }
    }
    updatePlayer();
  }

  function updatePlayer() {
    playerEl.style.left = (playerX * TILE_SIZE) + 'px';
    playerEl.style.top = (playerY * TILE_SIZE) + 'px';
    checkProximity();
  }

  function movePlayer(dx, dy) {
    const tx = playerX + dx;
    const ty = playerY + dy;
    
    if (tx < 0 || tx >= MAP_SIZE || ty < 0 || ty >= MAP_SIZE) return;
    
    // 土の道(1)と光る本(9)の上だけ歩けるように制限（それ以外の0,2,3,4,5は衝突して進めない）
    const nextTile = mapData[ty][tx];
    if (nextTile !== 1 && nextTile !== 9) return;

    if (dx < 0) {
      playerEl.classList.add('face-left');
    } else if (dx > 0) {
      playerEl.classList.remove('face-left');
    }

    playerX = tx;
    playerY = ty;
    updatePlayer();
  }

  function checkProximity() {
    const isAdjacent = (
      (Math.abs(playerX - EVENT_X) === 1 && playerY === EVENT_Y) ||
      (Math.abs(playerY - EVENT_Y) === 1 && playerX === EVENT_X) ||
      (playerX === EVENT_X && playerY === EVENT_Y)
    );

    if (isAdjacent) {
      actionBubble.style.display = 'block';
    } else {
      actionBubble.style.display = 'none';
    }
  }

  function tryInteract() {
    const isAdjacent = (
      (Math.abs(playerX - EVENT_X) === 1 && playerY === EVENT_Y) ||
      (Math.abs(playerY - EVENT_Y) === 1 && playerX === EVENT_X) ||
      (playerX === EVENT_X && playerY === EVENT_Y)
    );

    if (isAdjacent) {
      document.body.style.transition = "background 0.3s ease";
      document.body.style.background = "#fff";
      setTimeout(() => {
        window.location.href = 'index.html'; 
      }, 250);
    }
  }

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp' || e.key === 'w') { e.preventDefault(); movePlayer(0, -1); }
    if (e.key === 'ArrowDown' || e.key === 's') { e.preventDefault(); movePlayer(0, 1); }
    if (e.key === 'ArrowLeft' || e.key === 'a') { e.preventDefault(); movePlayer(-1, 0); }
    if (e.key === 'ArrowRight' || e.key === 'd') { e.preventDefault(); movePlayer(1, 0); }
    if (e.key === 'z' || e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      tryInteract();
    }
  });

  createMap();
</script>
</body>
</html>
