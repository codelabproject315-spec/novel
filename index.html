<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>深夜図書館の書</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap');

  :root{
    --bg-night:#12101c;
    --bg-panel:#1c1830;
    --gold:#d9b25e;
    --gold-soft:#f0d99a;
    --ember:#e8734a;
    --text-main:#ece6d8;
    --text-dim:#a89e8a;
    --line:rgba(217,178,94,0.28);
    --hue-shift:0deg;
  }

  *{ box-sizing:border-box; }

  html,body{ height:100%; margin:0; }

  body{
    background:var(--bg-night);
    color:var(--text-main);
    font-family:'Zen Kaku Gothic New', sans-serif;
    position:relative;
    /* body itself never scrolls — #appRoot below is the scroll container,
       so this works reliably even inside a fixed-height iframe/preview panel */
    overflow:hidden;
  }

  #appRoot{
    position:relative;
    height:100%;
    width:100%;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:26px 14px 40px;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(232,115,74,0.18), transparent 55%),
      radial-gradient(ellipse at 50% 120%, rgba(217,178,94,0.10), transparent 60%);
  }

  /* --- 漂う灯の粒子 --- */
  .embers{
    position:fixed; inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .ember-particle{
    position:absolute;
    bottom:-10px;
    width:3px; height:3px;
    border-radius:50%;
    background:var(--ember);
    box-shadow:0 0 6px 2px rgba(232,115,74,0.55);
    opacity:0;
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{ opacity:0; transform:translateY(0) translateX(0); }
    8%{ opacity:.8; }
    90%{ opacity:.5; }
    100%{ opacity:0; transform:translateY(-100vh) translateX(var(--drift,20px)); }
  }

  .topbar{
    width:min(94vw,560px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    z-index:1;
    margin-bottom:2px;
  }
  .sound-toggle{
    background:none;
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:16px;
    font-size:11px;
    letter-spacing:2px;
    padding:6px 12px;
    cursor:pointer;
    font-family:'Zen Kaku Gothic New', sans-serif;
    transition:all .2s ease;
  }
  .sound-toggle:hover{ color:var(--gold-soft); border-color:var(--gold); }
  .sound-toggle.active{ color:var(--gold-soft); border-color:var(--gold); background:rgba(217,178,94,0.08); }

  .catalog{
    font-size:11px;
    letter-spacing:1px;
    color:var(--text-dim);
  }
  .catalog b{ color:var(--gold-soft); font-weight:700; }

  .title{
    font-family:'Shippori Mincho', serif;
    font-weight:700;
    font-size:clamp(24px,6vw,34px);
    letter-spacing:8px;
    color:var(--gold-soft);
    text-shadow:0 0 22px rgba(217,178,94,0.35);
    margin:10px 0 2px;
    z-index:1;
  }
  .target{
    font-size:11px;
    letter-spacing:4px;
    color:var(--text-dim);
    margin-bottom:22px;
    z-index:1;
  }

  .book{
    width:min(94vw,560px);
    background:linear-gradient(180deg, var(--bg-panel), #16132a);
    border:1px solid var(--line);
    border-radius:14px;
    box-shadow:0 20px 60px rgba(0,0,0,0.55), inset 0 0 40px rgba(217,178,94,0.03);
    padding:30px 26px 24px;
    position:relative;
    overflow:hidden;
    z-index:1;
    /* 変更点：本自体の最大高さを指定し、内部をFlexbox構造にしてスクロールに対応 */
    max-height: 72vh;
    display: flex;
    flex-direction: column;
  }
  .book::before{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(180deg, rgba(232,115,74,0.06), transparent 40%);
    pointer-events:none;
  }

  .scene-tag{
    font-family:'Shippori Mincho', serif;
    font-size:12px;
    letter-spacing:5px;
    color:var(--ember);
    margin-bottom:14px;
    min-height:14px;
    opacity:0.9;
    display:flex;
    justify-content:space-between;
    flex-shrink: 0;
  }
  .scene-tag .inv{
    letter-spacing:0;
    font-size:13px;
    color:var(--gold-soft);
  }

  .story-text{
    font-family:'Shippori Mincho', serif;
    font-size:16.5px;
    line-height:2.05;
    color:var(--text-main);
    white-space:pre-wrap;
    min-height:120px;
    letter-spacing:0.5px;
    /* 変更点：文章が溢れた際に縦スクロールを可能にする設定 */
    overflow-y: auto;
    flex-grow: 1;
    padding-right: 4px;
  }
  .story-text .cursor{
    display:inline-block;
    width:2px; height:1em;
    background:var(--gold-soft);
    margin-left:2px;
    vertical-align:text-bottom;
    animation:blink 1s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  .divider{
    width:60px;
    height:1px;
    background:var(--line);
    margin:22px auto 20px;
    flex-shrink: 0;
  }

  .choices{
    display:flex;
    flex-direction:column;
    gap:10px;
    flex-shrink: 0;
  }

  .choice-btn{
    text-align:left;
    background:rgba(217,178,94,0.05);
    border:1px solid var(--line);
    color:var(--gold-soft);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:14.5px;
    padding:13px 16px;
    border-radius:8px;
    cursor:pointer;
    transition:all .18s ease;
    line-height:1.5;
    opacity:0;
    animation:choiceIn .4s ease forwards;
  }
  .choice-btn:nth-child(1){ animation-delay:.05s; }
  .choice-btn:nth-child(2){ animation-delay:.15s; }
  .choice-btn:nth-child(3){ animation-delay:.25s; }
  @keyframes choiceIn{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }

  .choice-btn:hover{
    background:rgba(217,178,94,0.14);
    border-color:var(--gold);
    transform:translateX(3px);
  }
  .choice-btn:active{ transform:scale(0.98); }
  .choice-btn .arrow{ color:var(--ember); margin-right:8px; }

  .ending-badge{
    display:inline-block;
    font-family:'Shippori Mincho', serif;
    font-size:13px;
    letter-spacing:3px;
    color:var(--bg-night);
    background:var(--gold-soft);
    padding:5px 16px;
    border-radius:20px;
    margin-bottom:16px;
  }

  .keepsakes{
    margin-top:18px;
    padding-top:16px;
    border-top:1px dashed var(--line);
    font-size:12.5px;
    color:var(--text-dim);
    letter-spacing:1px;
  }
  .keepsakes .item{
    color:var(--gold-soft);
    margin-right:10px;
  }

  .restart-btn{
    margin-top:16px;
    align-self:flex-start;
    background:transparent;
    border:1px solid var(--gold);
    color:var(--gold-soft);
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-weight:700;
    letter-spacing:2px;
    font-size:13px;
    padding:11px 22px;
    border-radius:24px;
    cursor:pointer;
  }
  .restart-btn:hover{ background:var(--gold); color:var(--bg-night); }

  .progress{
    display:flex;
    gap:5px;
    margin-top:20px;
    justify-content:center;
    z-index:1;
  }
  .progress .dot{
    width:5px; height:5px; border-radius:50%;
    background:rgba(217,178,94,0.25);
    transition:background .3s ease;
  }
  .progress .dot.on{ background:var(--gold); }

  .fade-in{ animation:fadeIn .5s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(4px);} to{ opacity:1; transform:translateY(0);} }

  .flash{ animation:flash .6s ease; }
  @keyframes flash{
    0%{ box-shadow:0 0 0 0 rgba(217,178,94,0); }
    30%{ box-shadow:0 0 60px 10px rgba(217,178,94,0.25); }
    100%{ box-shadow:0 20px 60px rgba(0,0,0,0.55); }
  }
</style>
</head>
<body>

  <div class="embers" id="embers"></div>

  <div id="appRoot">
    <div class="topbar">
      <button class="sound-toggle" id="soundToggle">♪ 音を灯す</button>
      <div class="catalog" id="catalog">既知の結末 <b>0</b>/9</div>
    </div>

    <div class="title">深夜図書館の書</div>
    <div class="tagline">MIDNIGHT LIBRARY — A BRANCHING TALE</div>

    <div class="book" id="bookPanel">
      <div class="scene-tag">
        <span id="sceneTag"></span>
        <span class="inv" id="invTag"></span>
      </div>
      <div class="story-text" id="storyText"></div>
      <div class="divider"></div>
      <div class="choices" id="choices"></div>
    </div>

    <div class="progress" id="progress"></div>
  </div>

<script>
(function(){

  /* ============================================================
     音響 — Web Audio による環境音とページ音
     ============================================================ */
  let audioCtx = null, droneNodes = null, soundOn = false;
  function ensureCtx(){
    if(!audioCtx){ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
    return audioCtx;
  }
  function startDrone(){
    const ctx = ensureCtx();
    const g = ctx.createGain(); g.gain.value = 0.0;
    g.connect(ctx.destination);
    const o1 = ctx.createOscillator(); o1.type='sine'; o1.frequency.value=110;
    const o2 = ctx.createOscillator(); o2.type='sine'; o2.frequency.value=164.8;
    const lfo = ctx.createOscillator(); lfo.frequency.value=0.08;
    const lfoGain = ctx.createGain(); lfoGain.gain.value=0.015;
    lfo.connect(lfoGain); lfoGain.connect(g.gain);
    o1.connect(g); o2.connect(g);
    o1.start(); o2.start(); lfo.start();
    g.gain.linearRampToValueAtTime(0.045, ctx.currentTime + 1.5);
    droneNodes = {g,o1,o2,lfo};
  }
  function stopDrone(){
    if(!droneNodes) return;
    const {g,o1,o2,lfo} = droneNodes;
    const ctx = ensureCtx();
    g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.8);
    setTimeout(()=>{ try{o1.stop();o2.stop();lfo.stop();}catch(e){} }, 900);
    droneNodes = null;
  }
  function pageChime(){
    if(!soundOn) return;
    try{
      const ctx = ensureCtx();
      const g = ctx.createGain(); g.gain.value=0.0001;
      const o = ctx.createOscillator(); o.type='sine';
      o.frequency.value = 660 + Math.random()*120;
      o.connect(g); g.connect(ctx.destination);
      o.start();
      g.gain.exponentialRampToValueAtTime(0.06, ctx.currentTime+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.9);
      o.stop(ctx.currentTime+0.95);
    }catch(e){}
  }
  document.getElementById('soundToggle').onclick = function(){
    soundOn = !soundOn;
    this.classList.toggle('active', soundOn);
    this.textContent = soundOn ? '♪ 音を消す' : '♪ 音を灯す';
    if(soundOn) startDrone(); else stopDrone();
  };

  /* --- 漂う灯の粒子生成 --- */
  const embersEl = document.getElementById('embers');
  for(let i=0;i<22;i++){
    const p = document.createElement('div');
    p.className = 'ember-particle';
    p.style.left = (Math.random()*100)+'vw';
    p.style.setProperty('--drift', (Math.random()*60-30)+'px');
    p.style.animationDuration = (9 + Math.random()*10)+'s';
    p.style.animationDelay = (Math.random()*12)+'s';
    embersEl.appendChild(p);
  }

  /* ============================================================
     ストーリーデータ(有向グラフ構造)
     ============================================================ */
  const story = {

    start:{
      tag:'第一章・閉館',
      text:'レポートの資料を探しているうちに、気づけば大学図書館の閉館時刻を過ぎていた。\n\n見上げると、天井の照明はすでに半分落とされ、あたりは驚くほど静かだった。スマートフォンの電波は入らない。出口のドアを押しても、鍵がかかっている。\n\n奥の書架のあいだから、かすかに橙色の光が漏れているのに気づいた。どこか遠くで、時計の針が普段より、ほんの少しゆっくり動いている気がする。',
      choices:[
        {label:'光の方へ歩いていく', next:'toward_light'},
        {label:'まず職員室を探して助けを呼ぶ', next:'find_staff'},
        {label:'椅子に座り、朝が来るのを静かに待つ', next:'wait_here'}
      ]
    },

    wait_here:{
      tag:'第二章・仮眠',
      text:'騒ぎ立てても仕方がないと、閲覧席の椅子に腰を下ろした。硬い木の背もたれに寄りかかると、思いのほか瞼が重くなる。\n\n夢とも現ともつかぬ狭間で、誰かが本を棚に戻す小さな音を聞いた気がした。トン、トン、と規則正しく。目を開けると、目の前の机に、見覚えのない一冊の本が置かれていた。',
      item:{id:'dream_book', label:'夢で置かれた本'},
      choices:[
        {label:'本を開いてみる', next:'dream_open'},
        {label:'目を閉じ、もう一度眠ってみる', next:'dream_sleep'}
      ]
    },

    dream_open:{
      tag:'第三章・眠りの頁',
      text:'ページには、これから起こることが日記のように綴られていた。「あなたは今夜、選ばなかった扉の数だけ、違う自分に出会う」\n\n読み終えた瞬間、文字が溶けるように消えていき、代わりに窓の外が白み始めているのに気づいた。',
      choices:[
        {label:'そのまま窓辺に立ち、夜明けを見る', next:'dream_ending'},
        {label:'本を鞄にしまい、忘れないようにする', next:'dream_ending_keep'}
      ]
    },

    dream_sleep:{
      tag:'第三章・二度寝',
      text:'もう一度目を閉じると、さきほどより深い眠りに落ちていった。夢の中で、誰かが小さく「おかえり」と囁いた気がした。\n\n次に目を開けたとき、窓の外はすっかり明るく、館内には他の学生たちの話し声が戻っていた。まるで、何事もなかったかのように。',
      ending:true,
      endingType:'DREAM ENDING',
      text2:'あなたはこの夜のことを、うまく思い出せない。ただ、机の上に一冊の本があったような、そんな気配だけが心に残っている。'
    },

    dream_ending:{
      tag:'終章・夜明け',
      text:'窓の外はいつのまにか白み、鳥の声がかすかに聞こえてくる。振り返ると、机の上の本はもう跡形もなかった。\n\nすべては、少し長い夢だったのかもしれない。それでも、椅子の温もりだけは、たしかに残っていた。',
      ending:true,
      endingType:'DREAM ENDING',
      text2:'あなたは何も持ち帰らなかったが、あの夜だけの静けさを、たしかに知っている。'
    },

    dream_ending_keep:{
      tag:'終章・持ち帰るもの',
      text:'鞄にしまったはずの本は、朝になって取り出そうとすると、いつのまにか一枚の古い栞に変わっていた。\n\n誰のものかもわからないその栞を、あなたはそっとポケットにしまった。',
      ending:true,
      endingType:'MYSTERY ENDING',
      text2:'それから時折、読みかけの本にその栞を挟むと、ページの隅にかすかな橙色の光が宿るような気がしている。'
    },

    toward_light:{
      tag:'第二章・古書',
      text:'光をたどっていくと、普段は立ち入り禁止になっている「特別書架」にたどり着いた。\n\n棚の一番奥に、革表紙の古い本が一冊だけ、まるで呼吸するようにぼんやりと光っている。表紙には文字のない、渦を巻いた紋様だけが刻まれていた。',
      choices:[
        {label:'本を手に取ってみる', next:'open_book'},
        {label:'触れずに、司書に報告しようと考える', next:'report_first'}
      ]
    },

    find_staff:{
      tag:'第二章・足音',
      text:'職員室に向かう途中、廊下の奥から規則正しい足音が聞こえてきた。カツ、カツ、と革靴が床を打つ音。\n\n「誰か、いらっしゃいますか」\n\n声をかけると、足音がぴたりと止まった。振り返った先には、古めかしい制服を着た女性が立っている。この大学では、もう何十年も前に廃止された制服だった。',
      choices:[
        {label:'女性に声をかけて話しかける', next:'meet_ghost'},
        {label:'距離を置き、そっと離れる', next:'avoid_ghost'}
      ]
    },

    open_book:{
      tag:'第三章・頁',
      text:'本を開いた瞬間、紙のあいだから淡い光があふれ出し、あたりの書架が渦を巻くように歪んでいく。\n\n気づけば、見たこともない書庫のような空間に立っていた。無数の本棚が、地平線の先まで続いている。どこかから、誰かが小さく歌う声が聞こえる。',
      choices:[
        {label:'歌声のする方へ進む', next:'song_path'},
        {label:'足元にあった本を拾い上げる', next:'pick_book'}
      ]
    },

    report_first:{
      tag:'第三章・逡巡',
      text:'触れるのは危険な気がして、本には触れずにその場を離れることにした。\n\n廊下を戻っていくと、さきほどまでなかったはずの案内板が壁に掛かっている。「地下書庫はこちら」――この図書館に地下があるなど、聞いたことがなかった。',
      choices:[
        {label:'案内板に従い、地下へ降りる', next:'basement'},
        {label:'無視して、正面玄関へ向かう', next:'front_door'}
      ]
    },

    meet_ghost:{
      tag:'第三章・元司書',
      text:'女性は静かに微笑み、「迷い込んでしまったのね」と呟いた。\n\n聞けば彼女は、五十年以上前にこの図書館で働いていた司書だという。ある夜、大切にしていた蔵書を貸出中に紛失してしまい、それを見つけるまでこの図書館を出られずにいるのだと語った。',
      choices:[
        {label:'一緒にその本を探すと申し出る', next:'help_ghost'},
        {label:'自分が先に出口を探させてほしいと頼む', next:'ask_exit'},
        {label:'その制服について、そっと尋ねてみる', next:'ask_uniform'}
      ]
    },

    ask_uniform:{
      tag:'第四章・古い制服',
      text:'「その制服、今はもうないものですよね」とたずねると、彼女は自分の袖口をそっと見つめた。\n\n「ええ。着替える機会も、もうずっとないものだから」――そう言って笑う横顔に、寂しさよりも、どこか懐かしむような色が浮かんでいた。\n\n彼女は少し考えたのち、「一緒に探してくれる？」と、控えめに手を差し出した。',
      choices:[
        {label:'手を取り、本探しを手伝う', next:'help_ghost'},
        {label:'「その笑顔だけで十分です」と伝える', next:'gentle_ending'}
      ]
    },

    gentle_ending:{
      tag:'終章・言葉ひとつ',
      text:'その一言に、女性は驚いたように目を見開き、それからゆっくりと目を細めた。「そんなふうに言われたのは、久しぶり」\n\n彼女の輪郭が、朝靄のようにやわらかくほどけていく。最後まで、寂しさは見見せなかった。',
      ending:true,
      endingType:'GOOD ENDING',
      item:{id:'gentle_words', label:'交わした言葉'},
      text2:'本を見つけ出せたわけではない。それでも、あなたは誰かの孤独に、たしかに寄り添うことができた。'
    },

    avoid_ghost:{
      tag:'第三章・静寂',
      text:'足音を立てないよう、そっと物陰に隠れた。女性はしばらくあたりを見回していたが、やがて何かに気づいたようにうつむき、書架の奥へと消えていった。\n\n静けさが戻ると、床に古い貸出カードが一枚落ちているのに気づいた。かすれた文字で、一冊の本の名前が記されている。',
      item:{id:'card', label:'古い貸出カード'},
      choices:[
        {label:'カードに書かれた本を書架で探す', next:'find_card_book'},
        {label:'カードは置いて、出口を探し続ける', next:'front_door'}
      ]
    },

    song_path:{
      tag:'第四章・歌',
      text:'歌声は、幼い少女のもののようだった。近づいていくと、少女は本棚の隙間にちょこんと座り込み、一冊の絵本を抱きしめている。\n\n「おねえちゃんも、迷子なの？」少女はそう言って、こちらを見上げた。',
      choices:[
        {label:'一緒に出口を探そうと手を差し出す', next:'good_ending'},
        {label:'少女が抱える絵本について尋ねる', next:'ask_picture_book'}
      ]
    },

    good_ending:{
      tag:'終章・手をつないで',
      text:'差し出した手を、少女は迷いなく握った。二人で本棚のあいだを歩いていくと、いつのまにか足元に小さな光の粒が集まり、道を照らしはじめる。\n\n「ありがとう、おねえちゃん」少女はそう言って、光の中へふっと溶けるように消えていった。気づけば、あなたは元の書架の前に立っていた。',
      item:{id:'small_hand', label:'つないだ手の温もり'},
      ending:true,
      endingType:'GOOD ENDING',
      text2:'誰かを一人にしなかったこと。それだけで、この夜は十分に意味があった。'
    },

    pick_book:{
      tag:'第四章・頁の中',
      text:'拾い上げた本を開くと、そこには見覚えのある文字――自分が今夜書くはずだったレポートの下書きが、そのままの筆跡で記されていた。\n\nまるでこの空間が、現実の続きのように繋がっている。ページをめくる手が、自然と震えた。',
      choices:[
        {label:'最後のページまで読み進める', next:'mystery_ending'},
        {label:'本を閉じて、その場から離れる', next:'front_door'}
      ]
    },

    basement:{
      tag:'第四章・地下',
      text:'古い石段を降りていくと、天井の低い書庫にたどり着いた。棚には手書きの目録が並び、埃をかぶった箱の中に、名前のない古い日記が一冊収められている。\n\n日記には、かつてこの図書館で行方不明になった学生の記録がつづられていた。',
      choices:[
        {label:'日記を最後まで読む', next:'read_diary'},
        {label:'目録の棚をさらに奥まで調べる', next:'basement_deep'},
        {label:'日記を戻し、静かに立ち去る', next:'front_door'}
      ]
    },

    basement_deep:{
      tag:'第五章・目録の奥',
      text:'棚の奥、目録の最後のページに、鉛筆でこう書き足されているのを見つけた。「この書庫を見つけた者へ――どうか、灯りを消さずに戻ってください」\n\n見れば、書庫の隅に小さなランプが一つ、今も静かに灯り続けている。誰かが、ずっとそれを絶やさずにいたのだ。',
      item:{id:'lamp_note', label:'灯りを託すメモ'},
      choices:[
        {label:'ランプの灯りを絶やさぬまま立ち去る', next:'lamp_ending'},
        {label:'ランプを消し、静かに立ち去る', next:'front_door'}
      ]
    },

    lamp_ending:{
      tag:'終章・灯を継ぐ者',
      text:'ランプはそのままに、あなたは石段を上っていく。振り返るたび、橙色の光が書庫の奥でゆらめいているのが見えた。\n\n誰かが灯し続けてきたものを、今夜はあなたが引き継いだ。それだけで、この地下には確かな意味が生まれた気がした。',
      ending:true,
      endingType:'GOOD ENDING',
      text2:'図書館のどこかで、今も小さな灯りが消えずに残っている。それを知っているのは、もうあなただけではない。'
    },

    front_door:{
      tag:'第五章・扉',
      text:'長い廊下を戻り、正面玄関にたどり着いた。押してみると、今度はあっさりとドアが開き、外の冷たい夜気が頬をなでる。\n\n振り返ると、図書館はいつも通りの静かな建物に戻っていた。',
      ending:true,
      endingType:'ESCAPE ENDING',
      text2:'何も持ち帰らず、何も知らないまま、あなたは図書館を後にした。翌朝、誰にこの話をしても、きっと信じてはもらえないだろう。'
    },

    help_ghost:{
      tag:'終章・約束',
      text:'元司書と共に書架を巡り、ついに紛失していた一冊――色褪せた詩集を、返却棚の隅に見つけ出した。\n\n本を手渡すと、女性の表情がふっとやわらぎ、長年の緊張が解けたように微笑んだ。「ありがとう。もう、行っていいのよ」\n\n気づけば、あたりには朝の光が差し込んでいた。',
      item:{id:'poem_book', label:'見つけ出した詩集'},
      ending:true,
      endingType:'GOOD ENDING',
      text2:'あなたは誰かの長い夜を、そっと終わらせることができた。図書館の扉を出るとき、背中に温かな気配を感じた気がした。'
    },

    ask_exit:{
      tag:'終章・拒絶',
      text:'「まず、出口を教えてください」と頼むと、女性の顔から表情が消えた。\n\n「……そう。誰も、手伝ってはくれないのね」\n\n彼女はうつむいたまま書架の奥へ消え、二度と戻ってこなかった。廊下の照明が一つ、また一つと消えていく。',
      ending:true,
      endingType:'BAD ENDING',
      text2:'出口は見つからないまま、闇の中に一人取り残される。図書館は、静かにあなたを迎え入れたまま――。'
    },

    find_card_book:{
      tag:'終章・貸出カード',
      text:'カードに記された本を探し当て、そっとページを開くと、栞代わりに挟まれていた一枚の写真が滑り落ちた。\n\n写真には、若かりし日の司書らしき女性と、一人の学生が笑って写っている。過去の誰かの、大切な思い出のひとつだった。',
      item:{id:'photo', label:'古い写真'},
      ending:true,
      endingType:'NEUTRAL ENDING',
      text2:'あなたは何かを解決したわけではないが、この図書館に流れる小さな物語の断片に、そっと触れることができた。'
    },

    ask_picture_book:{
      tag:'終章・絵本',
      text:'少女が抱える絵本の表紙には、大きな図書館とそこに住む小さな精霊たちの物語が描かれていた。\n\n「これはね、迷子になった子を、おうちまで送ってあげるお話なの」\n\n少女がページをめくると、光の粒があなたの足元に集まり、道を作るように伸びていく。',
      item:{id:'picture_book', label:'精霊たちの絵本'},
      ending:true,
      endingType:'GOOD ENDING',
      text2:'光の道に導かれ、あなたは静かに現実の廊下へと戻っていった。少女の歌声は、しばらく耳の奥に残っていた。'
    },

    mystery_ending:{
      tag:'終章・頁の奥',
      text:'最後のページには、こう記されていた。「この本を最後まで読んだ者は、物語の続きを自らの手で綴ることになる」\n\n文字が光の粒となってあなたの手に染み込み、視界がゆっくりと白く染まっていく。',
      ending:true,
      endingType:'MYSTERY ENDING',
      text2:'あなたがその後どこへ辿り着いたのか、誰も知らない。ただ、その日から図書館の特別書架には、新しい一冊が加わっていたという。'
    },

    read_diary:{
      tag:'終章・記録',
      text:'日記の最後のページには、震える字でこう書かれていた。「怖くはない。ただ、朝が来るまで、ここで静かに待っていようと思う」\n\n日記を閉じると、どこか遠くで鐘の音が響いた気がした。朝を告げる、大学の時計台の音だった。',
      ending:true,
      endingType:'NEUTRAL ENDING',
      text2:'誰かの静かな覚悟に触れたまま、あなたは地上への階段を上っていく。振り返っても、そこにはもう扉はなかった。'
    }
  };

  const TOTAL_ENDINGS = Object.values(story).filter(n=>n.ending).length;

  const storyTextEl = document.getElementById('storyText');
  const sceneTagEl = document.getElementById('sceneTag');
  const invTagEl = document.getElementById('invTag');
  const choicesEl = document.getElementById('choices');
  const progressEl = document.getElementById('progress');
  const catalogEl = document.getElementById('catalog');
  const bookPanel = document.getElementById('bookPanel');

  let visitedCount = 0;
  let inventory = []; // このプレイでの思い出の品
  let seenEndings = new Set(); // このセッション内で辿り着いた結末
  const TOTAL_STEPS_ESTIMATE = 4;

  async function loadCatalog(){
    try{
      const res = await window.storage.get('midnight_library_endings', false);
      if(res && res.value){
        const arr = JSON.parse(res.value);
        arr.forEach(id=>seenEndings.add(id));
      }
    }catch(e){ /* 保存データなし、または利用不可 */ }
    renderCatalog();
  }
  async function saveCatalog(){
    try{
      await window.storage.set('midnight_library_endings', JSON.stringify([...seenEndings]), false);
    }catch(e){ /* 保存できない環境では静かに諦める */ }
  }
  function renderCatalog(){
    catalogEl.innerHTML = '既知の結末 <b>'+seenEndings.size+'</b>/'+TOTAL_ENDINGS;
  }

  function typewrite(el, text){
    el.textContent = '';
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    let i = 0;
    const speed = 22;
    function step(){
      if(i <= text.length){
        el.textContent = text.slice(0, i);
        el.appendChild(cursor);
        i += 2;
        setTimeout(step, speed);
      } else {
        el.textContent = text;
      }
    }
    step();
  }

  function renderNode(id){
    const node = story[id];
    if(!node) return;

    pageChime();
    bookPanel.classList.remove('flash');
    void bookPanel.offsetWidth;
    bookPanel.classList.add('flash');

    sceneTagEl.textContent = node.tag || '';
    invTagEl.textContent = inventory.length ? ('携えているもの: ' + inventory.length) : '';
    storyTextEl.classList.remove('fade-in');
    void storyTextEl.offsetWidth;
    storyTextEl.classList.add('fade-in');

    choicesEl.innerHTML = '';

    if(node.item){
      inventory.push(node.item);
    }

    if(node.ending){
      seenEndings.add(id);
      saveCatalog();
      renderCatalog();

      const fullText = node.text + '\n\n' + (node.text2 || '');
      storyTextEl.innerHTML = '<span class="ending-badge">' + node.endingType + '</span>';
      const textHolder = document.createElement('div');
      storyTextEl.appendChild(textHolder);
      typewrite(textHolder, fullText);

      if(inventory.length){
        const keep = document.createElement('div');
        keep.className = 'keepsakes';
        keep.innerHTML = '今夜、手にしたもの — ' +
          inventory.map(it=>'<span class="item">◆ '+it.label+'</span>').join(' ');
        storyTextEl.appendChild(keep);
      }

      const restartBtn = document.createElement('button');
      restartBtn.className = 'restart-btn';
      restartBtn.textContent = 'もう一度、あの夜を選び直す';
      restartBtn.onclick = ()=>{
        visitedCount = 0;
        inventory = [];
        renderNode('start');
      };
      choicesEl.appendChild(restartBtn);
      updateProgress(TOTAL_STEPS_ESTIMATE, true);
      return;
    }

    typewrite(storyTextEl, node.text);

    node.choices.forEach((choice)=>{
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = '<span class="arrow">▸</span>' + choice.label;
      btn.onclick = ()=>{
        visitedCount++;
        renderNode(choice.next);
        document.querySelector('.book').scrollIntoView({behavior:'smooth', block:'start'});
      };
      choicesEl.appendChild(btn);
    });

    updateProgress(visitedCount, false);
  }

  function updateProgress(count, done){
    progressEl.innerHTML = '';
    for(let i=0;i<TOTAL_STEPS_ESTIMATE;i++){
      const dot = document.createElement('div');
      dot.className = 'dot' + (i < count || done ? ' on' : '');
      progressEl.appendChild(dot);
    }
  }

  loadCatalog().then(()=> renderNode('start'));
})();
</script>
</body>
</html>
